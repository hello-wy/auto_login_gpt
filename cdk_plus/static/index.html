<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CDK Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-950 antialiased">
    <main class="mx-auto w-full max-w-5xl px-4 py-6 sm:py-10">
      <section class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-xl shadow-slate-200/70">
        <header class="flex flex-col gap-3 border-b border-slate-200 px-5 py-5 sm:flex-row sm:items-center sm:justify-between sm:px-7">
          <div>
            <h1 class="text-2xl font-bold tracking-normal text-slate-950">CDK 邮箱验证码</h1>
            <p class="mt-1 text-sm text-slate-500">输入 CDK，获取邮箱验证码</p>
          </div>
          <time id="clock" class="text-sm font-medium text-slate-500">--</time>
        </header>

        <div class="space-y-6 px-5 py-6 sm:px-7">
          <div>
            <div class="mb-3 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
              <label class="text-sm font-semibold text-slate-700" for="cdkInput">CDK 列表</label>
              <span class="text-xs text-slate-500">支持批量查询，一行一个 CDK</span>
            </div>
            <textarea
              id="cdkInput"
              class="min-h-40 w-full resize-y rounded-lg border border-slate-300 bg-white px-4 py-3 font-mono text-sm leading-6 text-slate-950 shadow-inner shadow-slate-100 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
              placeholder="请输入 CDK，获取邮箱验证码&#10;例如：ABCD1234"
              spellcheck="false"
            ></textarea>
          </div>

          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <p id="message" class="min-h-5 text-sm text-slate-500"></p>
            <button
              id="queryButton"
              type="button"
              class="inline-flex min-h-11 items-center justify-center rounded-lg bg-blue-600 px-5 text-sm font-semibold text-white shadow-lg shadow-blue-600/20 transition hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-100 disabled:cursor-wait disabled:opacity-70"
            >
              查询验证码
            </button>
          </div>

          <section
            id="resultsPanel"
            class="hidden rounded-lg border border-slate-200 bg-slate-50/80 p-4 sm:p-5"
          >
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <span id="refreshText" class="text-sm font-medium text-slate-600">30 秒后自动刷新</span>
              <button
                id="refreshButton"
                type="button"
                class="inline-flex min-h-10 items-center justify-center rounded-lg bg-emerald-50 px-4 text-sm font-semibold text-emerald-700 transition hover:bg-emerald-100 focus:outline-none focus:ring-4 focus:ring-emerald-100 disabled:cursor-wait disabled:opacity-70"
              >
                刷新
              </button>
            </div>
            <div class="mt-3 h-2 overflow-hidden rounded-full bg-slate-200">
              <div id="progressBar" class="h-full w-full rounded-full bg-blue-600 transition-[width] duration-200"></div>
            </div>
            <div id="results" class="mt-5 grid gap-3"></div>
          </section>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
