name: Deploy CDK Plus

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cdk-plus
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/keytoauth_deploy
          chmod 600 ~/.ssh/keytoauth_deploy
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Package release
        run: |
          set -euo pipefail
          tar -czf /tmp/keytoauth-release.tgz \
            --exclude='.git' \
            --exclude='cloudmail.config.json' \
            --exclude='cdk_plus/*.sqlite3' \
            --exclude='cdk_plus/cloudmail.config.json' \
            .

      - name: Upload release
        run: |
          set -euo pipefail
          scp -i ~/.ssh/keytoauth_deploy \
            -o IdentitiesOnly=yes \
            /tmp/keytoauth-release.tgz \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/keytoauth-release.tgz"

      - name: Deploy on server
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/keytoauth_deploy \
            -o IdentitiesOnly=yes \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'bash -se' <<'REMOTE'
          set -euo pipefail
          release_dir="/opt/keytoauth/releases/${{ github.sha }}"
          mkdir -p "${release_dir}"
          tar -xzf /tmp/keytoauth-release.tgz -C "${release_dir}"
          rm -f /tmp/keytoauth-release.tgz
          cd "${release_dir}"
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r cdk_plus/requirements.txt
          ln -sfn "${release_dir}" /opt/keytoauth/current
          systemctl restart keytoauth-cdk-plus
          systemctl is-active --quiet keytoauth-cdk-plus
          find /opt/keytoauth/releases -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -rn \
            | tail -n +6 \
            | cut -d' ' -f2- \
            | xargs -r rm -rf
          REMOTE
