name: Refresh Sub2API Error Accounts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: sub2api-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CLOUDMAIL_CONFIG_JSON: ${{ secrets.CLOUDMAIL_CONFIG_JSON }}
      ACTION_SUB2API_ACCOUNTS_URL: ${{ secrets.SUB2API_ACCOUNTS_URL }}
      SUB2API_ADMIN_TOKEN: ${{ secrets.SUB2API_ADMIN_TOKEN }}
      SUB2API_IMPORT_URL: ${{ secrets.SUB2API_IMPORT_URL }}
      CHATGPT_PROXY: ${{ secrets.CHATGPT_PROXY }}
      FLARESOLVERR_URL: ${{ secrets.FLARESOLVERR_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          patchright install chrome

      - name: Write CloudMail config
        run: |
          set -euo pipefail
          if [ -z "${CLOUDMAIL_CONFIG_JSON}" ]; then
            echo "CLOUDMAIL_CONFIG_JSON secret is required" >&2
            exit 1
          fi
          printf '%s' "${CLOUDMAIL_CONFIG_JSON}" > cloudmail.config.json

      - name: Login error accounts headlessly
        run: |
          set -euo pipefail
          args=(
            "--input-source" "sub2api-errors"
            "--format" "sub2api"
            "--headless"
            "--sub2api-error-output" "sub2api_error_accounts.txt"
          )
          if [ -n "${ACTION_SUB2API_ACCOUNTS_URL}" ]; then
            args+=("--sub2api-accounts-url" "${ACTION_SUB2API_ACCOUNTS_URL}")
          fi
          if [ -n "${CHATGPT_PROXY}" ]; then
            args+=("--proxy" "${CHATGPT_PROXY}")
          fi
          if [ -n "${FLARESOLVERR_URL}" ]; then
            args+=("--flaresolverr-url" "${FLARESOLVERR_URL}")
          fi
          python main.py "${args[@]}"

      - name: Import generated sessions to Sub2API
        run: |
          set -euo pipefail
          if [ -z "${SUB2API_IMPORT_URL}" ]; then
            echo "SUB2API_IMPORT_URL secret is required" >&2
            exit 1
          fi

          shopt -s nullglob
          files=(output/*_sub2api.json)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Sub2API session files were generated" >&2
            exit 1
          fi

          for file in "${files[@]}"; do
            curl_args=(
              "--fail-with-body"
              "--show-error"
              "--silent"
              "--request" "POST"
              "--header" "Content-Type: application/json"
              "--data-binary" "@${file}"
              "${SUB2API_IMPORT_URL}"
            )
            if [ -n "${SUB2API_ADMIN_TOKEN}" ]; then
              curl_args=("--header" "Authorization: Bearer ${SUB2API_ADMIN_TOKEN}" "${curl_args[@]}")
            fi
            curl "${curl_args[@]}"
          done
